# /etc/nginx/sites-available/pattayavicecity
# After creating this file:
#   sudo ln -s /etc/nginx/sites-available/pattayavicecity /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d pattayavicecity.com -d www.pattayavicecity.com

server {
    listen 80;
    server_name pattayavicecity.com www.pattayavicecity.com;
    # Certbot will auto-add HTTPS config here

    # Max upload size (matches your app's 100MB video limit)
    client_max_body_size 100M;

    # Serve uploaded files directly via Nginx (bypasses Node = fast)
    location /uploads/ {
        alias /var/www/pattayavicecity/public/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Serve static assets directly
    location /_next/static/ {
        alias /var/www/pattayavicecity/.next/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Serve public files (icons, manifest, sw.js, logo)
    location /icons/ {
        alias /var/www/pattayavicecity/public/icons/;
        expires 30d;
        access_log off;
    }

    location /manifest.json {
        alias /var/www/pattayavicecity/public/manifest.json;
        access_log off;
    }

    location /sw.js {
        alias /var/www/pattayavicecity/public/sw.js;
        add_header Cache-Control "no-cache";
        access_log off;
    }

    # Everything else → Node.js app
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }
}
