<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Pattaya Vice City — Maintenance</title>
<link rel="icon" href="/favicon.ico"/>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0f0a1f;font-family:'Orbitron',sans-serif;color:#fff;overflow:hidden}
.bg{position:fixed;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(138,43,226,0.15) 0%,transparent 60%),radial-gradient(ellipse at 80% 100%,rgba(255,45,149,0.10) 0%,transparent 50%);z-index:0}
.scanlines{position:fixed;inset:0;z-index:1;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.12) 2px,rgba(0,0,0,0.12) 4px)}
.container{position:relative;z-index:2;text-align:center;padding:2rem;max-width:480px}
.logo{width:clamp(140px,35vw,320px);height:auto;margin-bottom:2rem;filter:drop-shadow(0 0 18px rgba(255,45,149,0.8)) drop-shadow(0 0 55px rgba(255,45,149,0.4))}
.code{font-size:clamp(3rem,10vw,5rem);font-weight:700;background:linear-gradient(to right,#ff2d95,#8a2be2,#00f5ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.2}
.msg{font-size:clamp(0.75rem,2.5vw,1rem);color:rgba(255,255,255,0.5);margin-top:1rem;font-weight:500;letter-spacing:0.05em}
.bar{margin-top:2rem;height:3px;width:120px;margin-left:auto;margin-right:auto;border-radius:2px;background:linear-gradient(to right,#ff2d95,#8a2be2,#00f5ff);animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.4;transform:scaleX(.7)}50%{opacity:1;transform:scaleX(1)}}
.retry{margin-top:2rem}
.retry a{display:inline-block;padding:.75rem 2rem;border-radius:.75rem;background:linear-gradient(to right,#ff2d95,#8a2be2);color:#fff;text-decoration:none;font-size:.85rem;font-weight:600;transition:box-shadow .3s}
.retry a:hover{box-shadow:0 0 24px rgba(255,45,149,0.5)}
</style>
</head>
<body>
<div class="bg"></div>
<div class="scanlines"></div>
<div class="container">
<img src="/assets/about/logo_reflect.png" alt="Pattaya Vice City" class="logo"/>
<div class="code">OFFLINE</div>
<p class="msg">The site is temporarily unavailable.<br/>We'll be back shortly.</p>
<div class="bar"></div>
<div class="retry"><a href="/">Retry</a></div>
</div>
</body>
</html>
